global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'gatling'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'host.docker.internal:9091' ]
  
  - job_name: 'gingonic'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['application:8080']